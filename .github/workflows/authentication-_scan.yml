# Reusable workflow — Authentication Service Trivy vulnerability scan.
# Called by authentication-trivy.yml (standalone + scheduled)
# and authentication-build-push.yml (pre-publish gate).

name: authentication-scan

on:
  workflow_call:

jobs:
  scan:
    name: Vulnerability & Secret Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan Python lockfile for CVEs and secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: uv.lock
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: pdc-authentication-scan
          cache-from: type=gha,scope=pdc-authentication-scan
          cache-to: type=gha,scope=pdc-authentication-scan,mode=max

      - name: Scan Docker image for CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: pdc-authentication-scan
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
