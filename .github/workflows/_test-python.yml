# Reusable workflow — Python test & coverage using uv and pytest.
# Compatible with any Python service that uses uv and pytest.

name: test-python

on:
  workflow_call:
    inputs:
      upload_coverage:
        description: "Upload HTML/XML coverage artifacts and push to Codecov"
        type: boolean
        default: false
      codecov_flags:
        description: "Codecov flag(s) to tag the coverage upload (e.g. the service name)"
        type: string
        default: ""
      working_directory:
        description: "The directory where the python package is located"
        type: string
        default: "."
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout schemas
        uses: actions/checkout@v6
        with:
          repository: Neosofia/schemas
          path: _schemas

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: uv sync --all-groups --frozen

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run tests with coverage
        env:
          ENV: test
          SCHEMAS_DIR: ${{ github.workspace }}/_schemas
        working-directory: ${{ inputs.working_directory }}
        run: |
          uv run --directory . pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:${{ github.workspace }}/coverage.xml \
            --cov-report=html:${{ github.workspace }}/htmlcov \
            -v

      - name: Run container integration tests
        env:
          RUN_DOCKER_TESTS: 1
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -d "tests/integration" ]; then
            uv run --directory . pytest tests/integration/ --no-cov -v
          else
            echo "No integration tests found, skipping."
          fi

      - name: Upload HTML coverage report
        if: inputs.upload_coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: ${{ github.workspace }}/htmlcov/
          retention-days: 30

      - name: Upload XML coverage report
        if: inputs.upload_coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: ${{ github.workspace }}/coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: inputs.upload_coverage
        uses: codecov/codecov-action@v6
        with:
          files: ${{ github.workspace }}/coverage.xml
          flags: ${{ inputs.codecov_flags }}
          token: ${{ secrets.CODECOV_TOKEN }}
