# Reusable workflow — Python test & coverage using uv and pytest.
# Compatible with any Python service that uses uv and pytest.

name: test-python

on:
  workflow_call:
    inputs:
      upload_coverage:
        description: "Upload HTML/XML coverage artifacts and push to Codecov"
        type: boolean
        default: false
      codecov_flags:
        description: "Codecov flag(s) to tag the coverage upload (e.g. the service name)"
        type: string
        default: ""
      working_directory:
        description: "The directory where the python package is located"
        type: string
        default: "."
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout schemas
        uses: actions/checkout@v6
        with:
          repository: Neosofia/schemas
          path: _schemas

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: uv sync --all-groups --frozen

      - name: Run tests with coverage
        env:
          ENV: test
          SCHEMAS_DIR: ${{ github.workspace }}/_schemas
        working-directory: ${{ inputs.working_directory }}
        run: |
          uv run --directory . pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:../../coverage.xml \
            -v

      - name: Upload HTML coverage report
        if: inputs.upload_coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 30

      - name: Upload XML coverage report
        if: inputs.upload_coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: inputs.upload_coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: ${{ inputs.codecov_flags }}
          token: ${{ secrets.CODECOV_TOKEN }}
