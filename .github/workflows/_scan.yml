# Reusable workflow — Trivy vulnerability & secret scan.
# Scans the lockfile (uv.lock) and a built Docker image.
# Compatible with any Python service that uses uv and has a Dockerfile.

name: scan

on:
  workflow_call:

jobs:
  scan:
    name: Vulnerability & Secret Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan Python lockfile for CVEs and secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: uv.lock
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ github.event.repository.name }}-scan
          cache-from: type=gha,scope=${{ github.event.repository.name }}-scan
          cache-to: type=gha,scope=${{ github.event.repository.name }}-scan,mode=max

      - name: Scan Docker image for CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ github.event.repository.name }}-scan
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
