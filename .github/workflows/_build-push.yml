name: build-push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full GHCR image name to publish"
        type: string
      context:
        description: "Docker build context"
        type: string
        default: .
      file:
        description: "Dockerfile path"
        type: string
        default: Dockerfile
      platforms:
        description: "Platforms to build"
        type: string
        default: linux/amd64,linux/arm64
      cache_scope:
        description: "GitHub Actions cache scope for the Docker build"
        type: string
      tag_prefix:
        description: "Prefix used for release tags in the registry (for example, authentication, capabilities, or python-template)"
        type: string
      push:
        description: "Whether to push the built image"
        type: boolean
        default: true

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate metadata tags
        id: meta-tags
        run: |
          echo "TAGS<<EOF" >> "$GITHUB_OUTPUT"
          echo "type=sha,prefix=sha-"
          echo "type=raw,value=latest,enable={{is_default_branch}}"
          echo "type=match,pattern=${{ inputs.tag_prefix }}/(.*),group=1"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image_name }}
          tags: ${{ steps.meta-tags.outputs.TAGS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.cache_scope }}
          cache-to: type=gha,scope=${{ inputs.cache_scope }},mode=max
